name: Test Microsoft Store CLI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: microsoft/microsoft-store-apppublisher@v1

      - name: Configure Store Credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId ${{ secrets.PARTNER_CENTER_TENANT_ID }} `
            --sellerId ${{ secrets.PARTNER_CENTER_SELLER_ID }} `
            --clientId ${{ secrets.PARTNER_CENTER_CLIENT_ID }} `
            --clientSecret ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}

      - name: Test JSON Parse
        shell: pwsh
        run: |
          node -e "
          const { execSync } = require('child_process');
      
          const out = execSync(
            'msstore submission get ${{ secrets.PARTNER_CENTER_PRODUCT_ID }}',
            { encoding: 'utf8' }
          );
      
          console.log('Parsing JSON...');
      
          const json = JSON.parse(out);
      
          console.log('SUCCESS!');
          console.log('Title:', json.Listings['en-us'].BaseListing.Title);
          console.log('Current Release Notes:');
          console.log(json.Listings['en-us'].BaseListing.ReleaseNotes);
          "
