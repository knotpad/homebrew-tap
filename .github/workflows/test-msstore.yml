name: Test Microsoft Store CLI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: microsoft/microsoft-store-apppublisher@v1

      - name: Configure Store Credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId ${{ secrets.PARTNER_CENTER_TENANT_ID }} `
            --sellerId ${{ secrets.PARTNER_CENTER_SELLER_ID }} `
            --clientId ${{ secrets.PARTNER_CENTER_CLIENT_ID }} `
            --clientSecret ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}

      - name: Inspect msstore output
        shell: pwsh
        run: |
          node -e "
          const { execSync } = require('child_process');
      
          const out = execSync(
            'msstore submission get ${{ secrets.PARTNER_CENTER_PRODUCT_ID }}',
            { encoding: 'utf8' }
          );
      
          console.log('Length:', out.length);
      
          const pos = 562;
      
          console.log('----- Around Error -----');
          console.log(out.substring(pos - 120, pos + 120));
          console.log('------------------------');
      
          const chars = [];
      
          for (let i = pos - 20; i < pos + 20; i++) {
            chars.push({
              index: i,
              char: JSON.stringify(out[i]),
              code: out.charCodeAt(i)
            });
          }
      
          console.table(chars);
          "
